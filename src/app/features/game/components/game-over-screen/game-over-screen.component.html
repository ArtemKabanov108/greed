<div class="overlay">
  <div class="card error-border">
    <h1 class="game-over-title">GAME OVER</h1>
    <p>You caught <strong>{{ score }}</strong> items!</p>
    <div class="button-group">
      <button class="btn" (click)="onRetry()">TRY AGAIN</button>
      <button class="btn btn-secondary" (click)="onMenu()">EXIT TO MENU</button>
    </div>
  </div>
</div>
